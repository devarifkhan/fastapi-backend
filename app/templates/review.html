<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Review</title>
    <style>
        body { font-family: sans-serif; max-width: 500px; margin: 40px auto; padding: 0 20px; }
        label { display: block; margin: 12px 0 4px; }
        input, textarea, select { width: 100%; padding: 8px; box-sizing: border-box; }
        button { margin-top: 16px; padding: 10px 24px; background: #333; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Rate Your Shipment</h1>
    <form action="{{ review_url }}" method="post">
        <label for="rating">Rating (1–5)</label>
        <select name="rating" id="rating" required>
            <option value="5">5 – Excellent</option>
            <option value="4">4 – Good</option>
            <option value="3">3 – Average</option>
            <option value="2">2 – Poor</option>
            <option value="1">1 – Terrible</option>
        </select>

        <label for="comment">Comment (optional)</label>
        <textarea name="comment" id="comment" rows="4"></textarea>

        <button type="submit">Submit Review</button>
    </form>
</body>
</html>
